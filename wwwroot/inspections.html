<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVIN - Inspections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .bg-gradient-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: -1; animation: pulse-slow 15s infinite alternate; }
        .blob-tr { top: -10%; right: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, #3b82f6 0%, transparent 70%); }
        .blob-bl { bottom: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, #8b5cf6 0%, transparent 70%); animation-delay: 5s; }
        @keyframes pulse-slow { 0% { transform: scale(1); opacity: 0.1; } 100% { transform: scale(1.1); opacity: 0.2; } }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        .menu-item { transition: all 0.2s ease; cursor: pointer; }
        .menu-item:hover, .menu-item.active { background: linear-gradient(90deg, rgba(79, 70, 229, 0.1) 0%, rgba(79, 70, 229, 0) 100%); border-left: 3px solid #6366f1; color: white; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex">
    <script>if (!localStorage.getItem('token')) window.location.href = '/';</script>

    <div class="bg-gradient-blob blob-tr"></div>
    <div class="bg-gradient-blob blob-bl"></div>

    <!-- Sidebar -->
    <aside class="w-64 glass-card border-r border-slate-700/50 hidden md:flex flex-col flex-shrink-0 relative z-20">
        <div class="h-20 flex items-center px-8 border-b border-slate-700/50">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">LIVIN<span class="text-slate-400 font-light text-lg">App</span></h1>
        </div>
        <div class="p-6 flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Main Menu</p>
            <nav class="space-y-2">
                <a href="/home.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500 group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <a href="/equipment.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500 group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Equipment
                </a>
                <a href="/inspections.html" class="menu-item active flex items-center px-4 py-3 rounded-r-lg text-slate-300 group">
                    <svg class="w-5 h-5 mr-3 text-indigo-400 group-hover:text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    Inspections
                </a>
                <a href="/maintenance.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500 group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Maintenance
                </a>
                <a href="/users.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500 group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Users
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative z-10 w-full overflow-hidden">
        <!-- Header -->
        <header class="h-20 glass-card border-b border-slate-700/50 flex items-center justify-between px-8 sticky top-0 z-30">
            <div class="flex items-center text-slate-300">
                <div class="text-sm font-medium tracking-wide">
                    <span class="text-slate-500">Pages</span> <span class="mx-2">/</span> <span class="text-white">Inspections</span>
                </div>
            </div>
        </header>

        <div class="p-8 pb-20 overflow-y-auto flex-1">
            
            <div class="mb-10 fade-in">
                <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400 mb-2">New Inspection</h2>
                <p class="text-slate-400">Scan barcode to load equipment parts and standard forms.</p>
            </div>

            <!-- View 1: Barcode Scanner -->
            <div id="viewScanner" class="max-w-md mx-auto glass-card rounded-2xl p-8 text-center fade-in">
                <div class="w-20 h-20 mx-auto bg-indigo-500/10 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                </div>
                <h3 class="text-2xl font-bold text-white mb-2">Scan Barcode</h3>
                <p class="text-slate-400 text-sm mb-6">Enter the Kode HAC manually or use the camera scanner.</p>
                
                <div id="reader" class="mb-6 mx-auto overflow-hidden rounded-xl border border-slate-700 hidden" style="width: 100%; max-width: 400px;"></div>
                
                <form id="scanForm" class="space-y-4">
                    <input type="text" id="hacInput" required placeholder="HAC-XXX-000" class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-center text-lg uppercase tracking-wider transition shadow-inner">
                    <button type="submit" id="scanBtn" class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-xl hover:bg-indigo-500 transition shadow-[0_0_15px_rgba(79,70,229,0.4)]">Look up Equipment</button>
                    <button type="button" id="startCameraBtn" onclick="startScanner()" class="w-full bg-slate-800 border border-slate-700 text-white font-semibold py-3 px-4 rounded-xl hover:bg-slate-700 transition flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Scan with Camera
                    </button>
                </form>
            </div>

            <!-- View 2: Form (Hidden initially) -->
            <div id="viewForm" class="hidden fade-in max-w-4xl mx-auto">
                <div class="glass-card rounded-2xl p-6 md:p-8">
                    <!-- Header Info -->
                    <div class="flex items-start justify-between border-b border-slate-700/60 pb-6 mb-8">
                        <div>
                            <p class="text-indigo-400 font-mono text-sm mb-1" id="eqHacCode">HAC-XXX</p>
                            <h3 class="text-2xl font-bold text-white" id="eqName">Equipment Name</h3>
                        </div>
                        <button onclick="window.location.reload()" class="text-sm text-slate-400 hover:text-white flex items-center px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 transition">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> Cancel
                        </button>
                    </div>

                    <!-- Dynamic Form -->
                    <form id="inspectionForm" onsubmit="submitInspection(event)">
                        <input type="hidden" id="equipmentId">
                        
                        <div id="partsContainer" class="space-y-8 mb-8">
                            <!-- Injected dynamically -->
                        </div>

                        <div class="border-t border-slate-700/60 pt-6">
                            <button type="submit" id="submitBtn" class="w-full sm:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-medium transition shadow-lg shadow-indigo-500/20 focus:outline-none flex items-center justify-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Submit Inspection Form
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Global Toast notification -->
    <div id="toast" class="fixed bottom-5 right-5 glass-card border-green-500/30 text-emerald-300 p-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.2)] transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <span id="toastMsg" class="font-medium text-sm">Error!</span>
    </div>

    <script>
                    const role = localStorage.getItem('role') || 'Guest';
            if (role !== 'Leader') {
                const usersMenu = document.querySelector('a[href="/users.html"]');
                if (usersMenu) usersMenu.style.display = 'none';
            }
            const token = localStorage.getItem('token');
        let currentEquipment = null;
        let html5QrcodeScanner = null;

        document.getElementById('hacInput').focus();

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.replace('border-green-500/30', 'border-red-500/30');
            t.classList.replace('text-emerald-300', 'text-rose-400');
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 4000);
        }

        function startScanner() {
            const readerDiv = document.getElementById('reader');
            const startBtn = document.getElementById('startCameraBtn');
            
            if (html5QrcodeScanner) {
                // Already scanning, stop it
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                    readerDiv.classList.add('hidden');
                    startBtn.innerHTML = `
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Scan with Camera
                    `;
                }).catch(err => console.error("Failed to stop scanner", err));
                return;
            }

            // Start scanning
            readerDiv.classList.remove('hidden');
            startBtn.innerHTML = `
                <svg class="w-5 h-5 mr-2 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                Stop Camera
            `;

            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .catch(err => {
                    showToast("Camera access denied or unavailable");
                    readerDiv.classList.add('hidden');
                    html5QrcodeScanner = null;
                });
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Stop scanner on success
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => html5QrcodeScanner.clear());
            }
            document.getElementById('reader').classList.add('hidden');
            
            // Set text & trigger lookup
            const input = document.getElementById('hacInput');
            input.value = decodedText;
            document.getElementById('scanBtn').click();
        }

        function onScanFailure(error) {
            // ignore constant read failures until success
        }

        document.getElementById('scanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('scanBtn');
            const hacCode = document.getElementById('hacInput').value.trim();
            if(!hacCode) return;

            btn.innerText = 'Scanning...';
            btn.disabled = true;

            try {
                const res = await fetch(`/api/Equipment/scan/${encodeURIComponent(hacCode)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if(res.ok) {
                    currentEquipment = await res.json();
                    buildForm(currentEquipment);
                } else if(res.status === 400) {
                    const errorText = await res.text();
                    alert(`Gagal: ${errorText}`);
                    window.location.href = '/home.html';
                } else if(res.status === 404 || res.status === 403) {
                    alert('Gagal: Kode HAC tidak valid atau tidak ditemukan!');
                    window.location.href = '/home.html';
                } else {
                    showToast('Terjadi kesalahan pada server');
                }
            } catch(err) {
                showToast('Koneksi terputus');
            } finally {
                btn.innerText = 'Look up Equipment';
                btn.disabled = false;
            }
        });

        function buildForm(eq) {
            document.getElementById('viewScanner').classList.add('hidden');
            document.getElementById('viewForm').classList.remove('hidden');
            
            document.getElementById('eqHacCode').innerText = eq.hacCode || eq.hACCode || eq.HACCode;
            document.getElementById('eqName').innerText = eq.name || eq.Name;
            document.getElementById('equipmentId').value = eq.id || eq.Id;

            const container = document.getElementById('partsContainer');
            container.innerHTML = '';

            const parts = eq.tasks || eq.Tasks || [];
            if(parts.length === 0) {
                container.innerHTML = `<p class="text-slate-500 italic">This equipment has no matching parts/tasks configured.</p>`;
                return;
            }

            parts.forEach((part, idx) => {
                const partName = part.description || part.Description;
                const standards = part.standards || part.Standards || [];
                const partId = part.id || part.Id;
                
                let standardsHtml = standards.map(std => {
                    const stdText = std.standardText || std.StandardText;
                    const stdId = std.id || std.Id;
                    return `
                    <div class="bg-slate-800/50 rounded-lg p-4 mb-3 border border-slate-700/50 inspection-standard" data-standard-id="${stdId}">
                        <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                            <div class="flex-1 mt-2">
                                <p class="text-slate-300 font-medium">${stdText}</p>
                            </div>
                            <div class="w-full md:w-64 flex-shrink-0 space-y-3">
                                <div>
                                    <label class="block text-xs text-slate-500 mb-1">Pilihan Task</label>
                                    <select required class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 task-val">
                                        <option value="" disabled selected>Pilih Task...</option>
                                        <option value="OK">OK</option>
                                        <option value="Rusak">Rusak</option>
                                        <option value="Perlu Setel">Perlu Setel</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-slate-500 mb-1">Tindak Lanjut (Jika Tidak Sesuai)</label>
                                    <select required class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 followup-val">
                                        <option value="None">None (Sesuai Standar)</option>
                                        <option value="Repair">Repair</option>
                                        <option value="Maintenance">Maintenance</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');

                container.innerHTML += `
                    <div class="relative pl-6 border-l-2 border-indigo-500/30">
                        <div class="absolute w-3 h-3 bg-indigo-500 rounded-full -left-[7px] top-1 shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
                        <h4 class="text-lg font-semibold text-white mb-4">Part: ${partName}</h4>
                        
                        <!-- hidden input holding task id for mapping -->
                        <div class="inspection-part" data-task-id="${partId}">
                            ${standardsHtml}
                        </div>
                    </div>
                `;
            });
        }

        async function submitInspection(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const ogText = btn.innerHTML;
            btn.innerHTML = 'Submitting...';
            btn.disabled = true;

            const eqId = parseInt(document.getElementById('equipmentId').value);
            const partNodes = document.querySelectorAll('.inspection-part');
            
            let details = [];
            partNodes.forEach(node => {
                const taskId = parseInt(node.getAttribute('data-task-id')); // Maps to InspectionTaskId (Part)
                
                const standardsNodes = node.querySelectorAll('.inspection-standard');
                standardsNodes.forEach(stdNode => {
                    const stdId = parseInt(stdNode.getAttribute('data-standard-id'));
                    const taskVal = stdNode.querySelector('.task-val').value;
                    const followUpVal = stdNode.querySelector('.followup-val').value;
                    
                    details.push({
                        inspectionTaskId: taskId,
                        taskStandardId: stdId,
                        isPassed: (taskVal === 'OK'),
                        selectedTask: taskVal,
                        followUpAction: followUpVal,
                        remarks: followUpVal !== 'None' ? `Follow up: ${followUpVal}` : '-'
                    });
                });
            });

            const payload = {
                equipmentId: eqId,
                type: 0, // Equipment type enum
                details: details
            };

            try {
                const res = await fetch('/api/Inspection/submit', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert('Inspeksi Berhasil Disimpan!');
                    window.location.href = '/home.html';
                } else {
                    showToast('Gagal submit inspeksi');
                    btn.innerHTML = ogText;
                    btn.disabled = false;
                }
            } catch(err) {
                showToast('Jaringan bermasalah');
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
