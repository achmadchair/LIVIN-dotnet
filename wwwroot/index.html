<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVIN - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Decorative blobs */
        .blob-1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.4) 0%, rgba(0,0,0,0) 70%); filter: blur(40px); animation: float 10s ease-in-out infinite alternate; z-index: 0; }
        .blob-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; border-radius: 50%; background: radial-gradient(circle, rgba(236,72,153,0.3) 0%, rgba(0,0,0,0) 70%); filter: blur(40px); animation: float 12s ease-in-out infinite alternate-reverse; z-index: 0; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.05); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }
        
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white relative">

    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="glass-panel w-full max-w-md rounded-3xl p-10 fade-in-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 mb-4 border border-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">Welcome to LIVIN</h1>
            <p class="text-gray-400 text-sm">Enter your credentials to access your account</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-1">
                <label for="username" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Username</label>
                <input type="text" id="username" name="username" required
                    class="input-glass w-full px-5 py-3.5 rounded-xl placeholder-gray-500"
                    placeholder="e.g. khoir">
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="input-glass w-full px-5 py-3.5 rounded-xl placeholder-gray-500"
                    placeholder="••••••••">
            </div>

            <div id="alertMsg" class="hidden text-sm rounded-xl p-4 font-medium transition-all duration-300 transform scale-95 opacity-0"></div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium py-3.5 px-4 rounded-xl hover:from-indigo-400 hover:to-purple-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 transition-all duration-300 shadow-[0_0_20px_rgba(99,102,241,0.4)] hover:shadow-[0_0_25px_rgba(99,102,241,0.6)] transform hover:-translate-y-0.5 mt-4 flex items-center justify-center">
                Sign In
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMsg');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            const showAlert = (message, isSuccess) => {
                alertMsg.textContent = message;
                alertMsg.className = `text-sm rounded-xl p-4 font-medium transition-all duration-300 transform scale-100 opacity-100 mt-4 ${
                    isSuccess ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30' : 'bg-rose-500/20 text-rose-300 border border-rose-500/30'
                }`;
            };

            // Reset state
            alertMsg.className = 'hidden';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...';

            try {
                const response = await fetch('/api/Account/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('siteName', data.siteName);
                    
                    showAlert(`Welcome ${data.username}! You are logged in as ${data.role} for ${data.siteName}.`, true);
                    
                    submitBtn.innerHTML = '<svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Success';
                    submitBtn.classList.remove('from-indigo-500', 'to-purple-600');
                    submitBtn.classList.add('from-emerald-500', 'to-emerald-600', 'shadow-[0_0_20px_rgba(16,185,129,0.4)]');
                    
                    // Redirect to the home dashboard
                    setTimeout(() => window.location.href = '/home.html', 1000);
                } else {
                    const errorText = await response.text();
                    showAlert(errorText || 'Invalid credentials. Please try again.', false);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign In';
                }
            } catch (error) {
                showAlert('Network error. Ensure the server is running.', false);
                console.error('Login error:', error);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
