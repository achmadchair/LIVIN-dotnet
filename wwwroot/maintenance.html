<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVIN - Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .bg-gradient-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: -1; animation: pulse-slow 15s infinite alternate; }
        .blob-tr { top: -10%; right: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, #f59e0b 0%, transparent 70%); }
        .blob-bl { bottom: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, #ef4444 0%, transparent 70%); animation-delay: 5s; }
        @keyframes pulse-slow { 0% { transform: scale(1); opacity: 0.1; } 100% { transform: scale(1.1); opacity: 0.2; } }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        .menu-item { transition: all 0.2s ease; cursor: pointer; }
        .menu-item:hover, .menu-item.active { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0) 100%); border-left: 3px solid #f59e0b; color: white; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal styling */
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="min-h-screen flex">
    <script>if (!localStorage.getItem('token')) window.location.href = '/';</script>

    <div class="bg-gradient-blob blob-tr"></div>
    <div class="bg-gradient-blob blob-bl"></div>

    <!-- Sidebar -->
    <aside class="w-64 glass-card border-r border-slate-700/50 hidden md:flex flex-col flex-shrink-0 relative z-20">
        <div class="h-20 flex items-center px-8 border-b border-slate-700/50">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-red-500">LIVIN<span class="text-slate-400 font-light text-lg">App</span></h1>
        </div>
        <div class="p-6 flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Main Menu</p>
            <nav class="space-y-2">
                <a href="/home.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <a href="/equipment.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Equipment
                </a>
                <a href="/inspections.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    Inspections
                </a>
                <a href="/maintenance.html" class="menu-item active flex items-center px-4 py-3 rounded-r-lg text-slate-300 group">
                    <svg class="w-5 h-5 mr-3 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Maintenance
                </a>
                <a href="/users.html" class="menu-item flex items-center px-4 py-3 rounded-r-lg text-slate-400 hover:text-slate-200 group">
                    <svg class="w-5 h-5 mr-3 text-slate-500 group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Users
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative z-10 w-full overflow-hidden">
        <!-- Header -->
        <header class="h-20 glass-card border-b border-slate-700/50 flex items-center justify-between px-8 sticky top-0 z-30">
            <div class="flex items-center text-slate-300">
                <div class="text-sm font-medium tracking-wide">
                    <span class="text-slate-500">Pages</span> <span class="mx-2">/</span> <span class="text-white">Maintenance Tickets</span>
                </div>
            </div>
            <button onclick="loadMaintenance()" class="p-2 text-slate-400 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </header>

        <div class="p-8 pb-20 overflow-y-auto flex-1">
            <div class="mb-10 fade-in">
                <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400 mb-2">Pending Maintenance</h2>
                <p class="text-slate-400">List of equipment flagged for repair or maintenance from recent inspections.</p>
            </div>

            <!-- Tickets Grid -->
            <div id="ticketsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
                <!-- Data goes here -->
            </div>
        </div>
    </main>

    <!-- Complete Maintenance Modal -->
    <div id="maintenanceModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay opacity-0 transition-opacity duration-300">
        <div class="glass-card w-full max-w-md rounded-2xl p-8 transform scale-95 transition-transform duration-300 mx-4 border border-orange-500/30">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-xl font-bold text-white">Complete Job</h3>
                    <p class="text-sm text-indigo-400 font-mono" id="modalEqCode">HAC-XXX</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <form id="completeForm" onsubmit="submitCompletion(event)" class="space-y-4">
                <input type="hidden" id="jobId">
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider">Technician Name</label>
                    <input type="text" id="techName" required class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-2.5 rounded-xl focus:ring-1 focus:ring-orange-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider">Completion Notes</label>
                    <textarea id="completionNotes" rows="3" required placeholder="Describe what was repaired/maintained..." class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-2.5 rounded-xl focus:ring-1 focus:ring-orange-500 focus:outline-none"></textarea>
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2.5 bg-slate-800 text-white rounded-xl hover:bg-slate-700 transition">Cancel</button>
                    <button type="submit" id="submitModalBtn" class="flex-1 px-4 py-2.5 bg-orange-600 text-white font-medium rounded-xl hover:bg-orange-500 transition shadow-[0_0_15px_rgba(249,115,22,0.4)]">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Global Toast notification -->
    <div id="toast" class="fixed bottom-5 right-5 glass-card border-green-500/30 text-emerald-300 p-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.2)] transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <span id="toastMsg" class="font-medium text-sm">Success!</span>
    </div>

    <script>
                    const role = localStorage.getItem('role') || 'Guest';
            if (role !== 'Leader') {
                const usersMenu = document.querySelector('a[href="/users.html"]');
                if (usersMenu) usersMenu.style.display = 'none';
            }
            const token = localStorage.getItem('token');

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            if(isError) {
                t.classList.replace('border-green-500/30', 'border-red-500/30');
                t.classList.replace('text-emerald-300', 'text-rose-400');
            } else {
                t.classList.replace('border-red-500/30', 'border-green-500/30');
                t.classList.replace('text-rose-400', 'text-emerald-300');
            }
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 4000);
        }

        async function loadMaintenance() {
            try {
                const res = await fetch('/api/Maintenance/open', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(!res.ok) throw new Error();
                const data = await res.json();
                
                const grid = document.getElementById('ticketsGrid');
                if(data.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-12 text-center text-slate-500 border border-dashed border-slate-700 rounded-2xl">
                            <svg class="w-12 h-12 mx-auto text-slate-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            <p class="text-lg">No open maintenance jobs!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.map(job => `
                    <div class="glass-card rounded-2xl p-6 border-l-4 border-l-orange-500 hover:bg-slate-800/60 transition group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg text-white group-hover:text-orange-400 transition">${job.equipmentName}</h3>
                                <p class="text-xs font-mono text-slate-400">${job.hacCode}</p>
                            </div>
                            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase bg-orange-500/10 text-orange-400 border border-orange-500/20">Open</span>
                        </div>
                        <p class="text-slate-300 text-sm mb-6 line-clamp-3">${job.remarks}</p>
                        <div class="flex items-center justify-between border-t border-slate-700/50 pt-4">
                            <span class="text-xs text-slate-500">${new Date(job.requestedDate).toLocaleDateString()}</span>
                            <button onclick="openModal(${job.id}, '${job.hacCode} - ${job.equipmentName}')" class="text-sm text-orange-400 hover:text-orange-300 font-medium flex items-center">
                                Resolve <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch(e) {
                showToast('Failed to load maintenance records', true);
            }
        }

        // Modal Logic
        const modal = document.getElementById('maintenanceModal');
        
        function openModal(id, title) {
            document.getElementById('jobId').value = id;
            document.getElementById('modalEqCode').innerText = title;
            document.getElementById('techName').value = '';
            document.getElementById('completionNotes').value = '';
            
            modal.classList.remove('hidden');
            // small delay for transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.glass-card').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modal.querySelector('.glass-card').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        async function submitCompletion(e) {
            e.preventDefault();
            const btn = document.getElementById('submitModalBtn');
            const ogText = btn.innerHTML;
            btn.innerHTML = 'Saving...';
            btn.disabled = true;

            const id = document.getElementById('jobId').value;
            const payload = {
                technician: document.getElementById('techName').value,
                completionNotes: document.getElementById('completionNotes').value
            };

            try {
                const res = await fetch(`/api/Maintenance/complete/${id}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    showToast('Maintenance marked as completed!');
                    closeModal();
                    loadMaintenance();
                } else {
                    showToast('Failed to complete maintenance', true);
                }
            } catch(err) {
                showToast('Network error', true);
            } finally {
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        }

        // Init
        loadMaintenance();
    </script>
</body>
</html>
